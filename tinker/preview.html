<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo 设计预览 - 翻转时钟</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body>
  <header>
    <h1>Logo 设计预览</h1>
    <p class="subtitle">翻转时钟 · 简约风格</p>
    <div class="mode-toggle">
      <button id="toggleDark" class="toggle-btn">切换深色/浅色</button>
    </div>
  </header>

  <main class="gallery">
    <div class="grid">
      <div class="card" data-name="circle-clock">
        <div class="logo-container">
          <img src="logo-01-circle-clock.svg" alt="圆形时钟">
        </div>
        <span class="label">01 圆形时钟</span>
      </div>
      <div class="card" data-name="square-clock">
        <div class="logo-container">
          <img src="logo-02-square-clock.svg" alt="方形时钟">
        </div>
        <span class="label">02 方形时钟</span>
      </div>
      <div class="card" data-name="diamond-clock">
        <div class="logo-container">
          <img src="logo-03-diamond-clock.svg" alt="菱形时钟">
        </div>
        <span class="label">03 菱形时钟</span>
      </div>
      <div class="card" data-name="dotted-circle">
        <div class="logo-container">
          <img src="logo-04-dotted-circle.svg" alt="点状圆环">
        </div>
        <span class="label">04 点状圆环</span>
      </div>
      <div class="card" data-name="arc-clock">
        <div class="logo-container">
          <img src="logo-05-arc-clock.svg" alt="弧形时钟">
        </div>
        <span class="label">05 弧形时钟</span>
      </div>
      <div class="card" data-name="flip-clock">
        <div class="logo-container">
          <img src="logo-06-flip-clock.svg" alt="翻页时钟">
        </div>
        <span class="label">06 翻页时钟</span>
      </div>
      <div class="card" data-name="bold-circle">
        <div class="logo-container">
          <img src="logo-07-bold-circle.svg" alt="粗圆环时钟">
        </div>
        <span class="label">07 粗圆环时钟</span>
      </div>
      <div class="card" data-name="rounded-square">
        <div class="logo-container">
          <img src="logo-08-rounded-square.svg" alt="圆角方形">
        </div>
        <span class="label">08 圆角方形</span>
      </div>
      <div class="card" data-name="star-clock">
        <div class="logo-container">
          <img src="logo-09-star-clock.svg" alt="星形时钟">
        </div>
        <span class="label">09 星形时钟</span>
      </div>
      <div class="card" data-name="ellipse-clock">
        <div class="logo-container">
          <img src="logo-10-ellipse-clock.svg" alt="椭圆时钟">
        </div>
        <span class="label">10 椭圆时钟</span>
      </div>
      <div class="card" data-name="concentric-circle">
        <div class="logo-container">
          <img src="logo-11-concentric-circle.svg" alt="同心圆">
        </div>
        <span class="label">11 同心圆</span>
      </div>
      <div class="card" data-name="flip-display">
        <div class="logo-container">
          <img src="logo-12-flip-display.svg" alt="翻页显示">
        </div>
        <span class="label">12 翻页显示</span>
      </div>
      <div class="card" data-name="diamond-solid">
        <div class="logo-container">
          <img src="logo-13-diamond-solid.svg" alt="实心菱形">
        </div>
        <span class="label">13 实心菱形</span>
      </div>
      <div class="card" data-name="clean-circle">
        <div class="logo-container">
          <img src="logo-14-clean-circle.svg" alt="简洁圆形">
        </div>
        <span class="label">14 简洁圆形</span>
      </div>
      <div class="card" data-name="pill-clock">
        <div class="logo-container">
          <img src="logo-15-pill-clock.svg" alt="胶囊形">
        </div>
        <span class="label">15 胶囊形</span>
      </div>
      <div class="card" data-name="hexagon-clock">
        <div class="logo-container">
          <img src="logo-16-hexagon-clock.svg" alt="六边形">
        </div>
        <span class="label">16 六边形</span>
      </div>
      <div class="card" data-name="multi-circle">
        <div class="logo-container">
          <img src="logo-17-multi-circle.svg" alt="多重圆环">
        </div>
        <span class="label">17 多重圆环</span>
      </div>
      <div class="card" data-name="square-text">
        <div class="logo-container">
          <img src="logo-18-square-text.svg" alt="方形+文字">
        </div>
        <span class="label">18 方形+文字</span>
      </div>
      <div class="card" data-name="donut-clock">
        <div class="logo-container">
          <img src="logo-19-donut-clock.svg" alt="甜甜圈">
        </div>
        <span class="label">19 甜甜圈</span>
      </div>
      <div class="card" data-name="hexagon-fill">
        <div class="logo-container">
          <img src="logo-20-hexagon-fill.svg" alt="填充六边">
        </div>
        <span class="label">20 填充六边</span>
      </div>
      <div class="card" data-name="sunset-clock">
        <div class="logo-container">
          <img src="logo-21-sunset-clock.svg" alt="日出风格">
        </div>
        <span class="label">21 日出风格</span>
      </div>
      <div class="card" data-name="digital-clock">
        <div class="logo-container">
          <img src="logo-22-digital-clock.svg" alt="数字时钟">
        </div>
        <span class="label">22 数字时钟</span>
      </div>
      <div class="card" data-name="soft-circle">
        <div class="logo-container">
          <img src="logo-23-soft-circle.svg" alt="柔和圆形">
        </div>
        <span class="label">23 柔和圆形</span>
      </div>
      <div class="card" data-name="long-hex">
        <div class="logo-container">
          <img src="logo-24-long-hex.svg" alt="长六边形">
        </div>
        <span class="label">24 长六边形</span>
      </div>
      <div class="card" data-name="minimal-accent">
        <div class="logo-container">
          <img src="logo-25-minimal-accent.svg" alt="极简点缀">
        </div>
        <span class="label">25 极简点缀</span>
      </div>
    </div>
  </main>

  <footer>
    <p>请选择一个设计方向（输入编号如 06）</p>
  </footer>

  <script>
    const toggleBtn = document.getElementById('toggleDark');
    let isDark = false;

    toggleBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
    });

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      });
    });
  </script>
</body>
</html>
